# Bitvavo.Net CI — JKorf-conformant matrix build + test + pack
#
# This workflow is shipped inside the package directory and ready to run once the
# package source is extracted/forked to its own repository (e.g. github.com/JKorf/Bitvavo.Net).
# GitHub Actions only picks up workflows from `.github/workflows/` at the repo root, so
# this file does NOT run in the c:/Ait/Base monorepo — it travels with the package on
# JKorf submission.

name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: build + test (${{ matrix.os }} / .NET ${{ matrix.dotnet }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        dotnet: [ '8.0.x', '9.0.x', '10.0.x' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore Bitvavo.Net.csproj

      - name: Build (Release)
        run: dotnet build Bitvavo.Net.csproj -c Release --no-restore

      - name: Test
        run: dotnet test Tests/Bitvavo.Net.Tests/Bitvavo.Net.Tests.csproj -c Release --no-build --logger "trx;LogFileName=bitvavo-net.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.dotnet }}
          path: '**/TestResults/*.trx'

  pack:
    name: pack-validation
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Bitvavo.Net.csproj

      - name: Pack
        run: dotnet pack Bitvavo.Net.csproj -c Release -o ./artifacts

      - name: Verify nupkg + snupkg exist
        run: |
          ls -la ./artifacts
          test -f ./artifacts/Bitvavo.Net.*.nupkg
          test -f ./artifacts/Bitvavo.Net.*.snupkg

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*
